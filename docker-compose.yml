services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: vestra
      POSTGRES_USER: vestra
      POSTGRES_PASSWORD: vestra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vestra -d vestra"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -x node_modules/.bin/next ]; then npm ci; fi &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
